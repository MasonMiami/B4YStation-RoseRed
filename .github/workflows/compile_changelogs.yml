name: Compile changelogs

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  CompileCL:
    name: "Compile changelogs"
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 25
      - name: Python setup
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install depends
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/changelog/requirements.txt
      - name: Compile CL
        run: python tools/changelog/ss13_genchangelog.py html/changelogs
      - name: Commit
        run: |
          git config --local user.email os.getenv("GIT_EMAIL")
          git config --local user.name os.getenv("GIT_NAME")
          git pull origin master
          git add html/changelogs
          git commit -m "Automatic changelog compile [ci skip]" -a || true
      - name: Push
        uses: CasperWA/push-protected@v2
        with:
          #github_token: ${{ secrets.GITHUB_TOKEN }} Use this instead if you have unprotected branches
          token: ${{ secrets.CL_TOKEN }}
          branch: master
